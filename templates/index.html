  function scrollChatGradually(chat, wordsCount, delay = 150) {
    // Only scroll if user is near bottom
    const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 20;
    if (!atBottom) return;

    let step = 0;
    const interval = setInterval(() => {
        if (step >= wordsCount) {
            clearInterval(interval);
            return;
        }
        chat.scrollTop = chat.scrollHeight;
        step++;
    }, delay);
}
/* ---------- CREATE AI MESSAGE WITH CODE & BOLD ---------- */
// Helper function for headings
function createHeadingFromMarkdown(text, container) {
    const match = text.match(/##\s*(.*?)\s*##/);
    if (match && match[1]) {
        const h = document.createElement("h3");
        h.style.fontSize = "1.8rem";
        h.style.fontWeight = "700";
        h.style.margin = "8px 0";

        // Word-by-word fade animation
        match[1].split(" ").forEach((word, i) => {
            const span = document.createElement("span");
            span.textContent = word + " ";
            span.style.display = "inline-block";
            span.style.opacity = 0;
            span.style.transform = "translateY(6px)";
            span.style.animation = "fadeWord 0.35s forwards";
            span.style.animationDelay = (i * 0.05) + "s";
          
            h.appendChild(span);
        });

        container.appendChild(h);
     let hr = document.createElement('hr')
      container.appendChild(hr)
 
        return text.replace(match[0], "").trim(); // return remaining text
    }
    return text;
}

// Full createAIMessageWithCopy function
function createAIMessageWithCopy(text) {
    const chat = document.getElementById("chatA");
    const aiMsg = document.createElement("div");
    aiMsg.className = "aiMsg";

    const bubble = document.createElement("div");
    bubble.className = "aiBall";

    // Typing dot at the end
    const typingDot = document.createElement("span");
    typingDot.style.display = "inline-block";
    typingDot.style.width = "8px";
    typingDot.style.height = "8px";
    typingDot.style.background = "black";
    typingDot.style.borderRadius = "50%";
    typingDot.style.marginLeft = "4px";
    typingDot.style.animation = "blink 1s infinite";
    bubble.appendChild(typingDot);

    if (!document.getElementById("blinkKeyframes")) {
        const style = document.createElement("style");
        style.id = "blinkKeyframes";
        style.innerHTML = `
            @keyframes blink { 
                0%, 50%, 100% { opacity: 1; } 
                25%, 75% { opacity: 0; } 
            }
            @keyframes fadeWord {
                from { opacity: 0; transform: translateY(5px); }
                to   { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    }

    // Handle heading first
    text = createHeadingFromMarkdown(text, bubble);

    // Split by code blocks
    const parts = text.split("```");
    parts.forEach((part, index) => {
        if (index % 2 === 1) {
            // CODE BLOCK
            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = part.trim();
            pre.appendChild(code);

            const copyBtn = document.createElement("button");
            copyBtn.textContent = "Copy";
            copyBtn.className = "copy-btn";
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(code.textContent);
                copyBtn.textContent = "Copied!";
                setTimeout(() => copyBtn.textContent = "Copy", 1500);
            };

            const wrapper = document.createElement("div");
            wrapper.className = "code-wrapper";
            wrapper.appendChild(copyBtn);
            wrapper.appendChild(pre);
            bubble.appendChild(wrapper);
        } else {
            // NORMAL TEXT WITH WORD ANIMATION
            if (part.trim()) {
                const div = document.createElement("div");
                div.className = "ai-text";
                const formatted = part
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                formatted.split(/\s+/).forEach((word, i) => {
                    const span = document.createElement("span");
                    span.innerHTML = word + " ";
                    span.style.opacity = 0;
                    span.style.display = "inline-block";
                    span.style.transform = "translateY(4px)";
                    span.style.animation = "fadeWord 0.35s forwards";
                    span.style.animationDelay = (i * 0.05) + "s";
                    div.appendChild(span);
                });

                bubble.appendChild(div);
            }
        }
    });

    aiMsg.appendChild(bubble);
    chat.appendChild(aiMsg);

    // Remove typing dot after animation
    const totalWords = bubble.querySelectorAll("span").length;
    setTimeout(() => typingDot.remove(), totalWords * 50 + 500);

   // chat.scrollTop = chat.scrollHeight;

    if (window.MathJax) {
        MathJax.typesetPromise([aiMsg]);
    }
} 
  function autoResizeMath(container) {
    const mathBlocks = container.querySelectorAll('.math-display');

    mathBlocks.forEach(math => {
        const tex = math.textContent || "";
        let fontSize = 1.1; // default em size

        // Adjust font size based on character count
        if (tex.length > 30) fontSize = 0.8;
        if (tex.length > 60) fontSize = 0.7;
        if (tex.length > 80) fontSize = 0.6;
        if (tex.length > 100) fontSize = 0.;

        math.style.fontSize = fontSize + "em";
    });
}
async function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    const imageFile = imageInput.files[0];
    if (!msg && !imageFile) return;

    const chat = document.getElementById("chatA");

    // ---------------- USER MESSAGE UI ----------------
    const my = document.createElement("div");
    my.className = "myMsg";

    const myBox = document.createElement("div");
    myBox.className = "myBox";

    // Show image in user message if exists
    if (imageFile) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.style.maxWidth = "160px";
            img.style.borderRadius = "12px";
            img.style.display = "block";
            img.style.marginBottom = "6px";
            myBox.prepend(img);
        };
        reader.readAsDataURL(imageFile);
    }

    if (msg) myBox.appendChild(document.createTextNode(msg));

    my.appendChild(myBox);
    chat.appendChild(my);

    input.value = "";
   chat.scrollTop = chat.scrollHeight;

    // ---------------- LOADER ----------------
    const loader = document.createElement("div");
    loader.className = "aiMsg";
    loader.innerHTML = `
  
        <div class="aiLoad typing"><span></span><span></span><span></span></div>
        <div id=container>
            <div id=flip>
                <div><div>Analysing</div></div>
                <div><div>Searching</div></div>
                <div><div>Thinking</div></div>
            </div>
        </div>`;
    chat.appendChild(loader);
    chat.scrollTop = chat.scrollHeight;

    // 🧹 Clear preview image
    previewContainer.style.display = "none";
    imageInput.value = "";

    try {
        let reply = null;

        // 🔍 Check Firebase cache (text only)
        if (msg) {
            const snapshot = await db.ref('qA')
                .orderByChild('question')
                .equalTo(msg)
                .once('value');

            if (snapshot.exists() && !imageFile) {
                snapshot.forEach(child => {
                    reply = child.val().answer;
                });
            }
        }

        // 🌐 Call backend if no cached reply OR image present
        if (!reply) {
            // --- Use FormData ---
            const formData = new FormData();
            formData.append("user_id", "default");
            formData.append("message", msg);
            if (imageFile) formData.append("image", imageFile);

            const res = await fetch("/chat", {
                method: "POST",
                body: formData
            });

            let data;
            try {
                data = await res.json();
            } catch (err) {
                // If server returns HTML instead of JSON, log it
                const text = await res.text();
                console.error("Server returned non-JSON:", text);
                data = { reply: "⚠ Server error" };
            }

            reply = data.reply || "⚠ Server error";

            // Save text-only Q&A to Firebase
            if (msg && !imageFile) {
                db.ref('qA').push({
                    question: msg,
                    answer: reply,
                    timestamp: new Date().toISOString()
                });
            }
        }

        loader.remove();

        // ---------------- AI MESSAGE UI ----------------
        createAIMessageWithCopy(reply);
       
        // Save local history
        let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
        history.push({ question: msg, answer: reply });
        localStorage.setItem("chatHistory", JSON.stringify(history));

    } catch (err) {
        loader.remove();
        const ai = document.createElement("div");
        ai.className = "aiMsg";
        ai.innerHTML = `<div class="aiBox">Error: ${escapeHTML(err.message)}</div>`;
        chat.appendChild(ai);
        //chat.scrollTop = chat.scrollHeight;
    }
}

    bottomSheet.style.transform = "translateY(100%)";
    
    requestAnimationFrame(() => {
        bottomSheet.style.transition = "transform 0.3s ease";
        bottomSheet.style.transform = "translateY(0)";
    });

    document.body.style.overflow = "hidden";
    sheetHeight = bottomSheet.offsetHeight;
});

closeBtn.addEventListener("click", hideBottomSheet);

function hideBottomSheet() {
    bottomSheet.style.transform = "translateY(100%)";
    document.body.style.overflow = "auto";
}

/* -------- DRAG START -------- */
dragHandle.addEventListener("mousedown", startDrag);
dragHandle.addEventListener("touchstart", startDrag);

function startDrag(e) {
    isDragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag);
    document.addEventListener("touchend", stopDrag);
}

/* -------- DRAGGING -------- */
function drag(e) {
    if (!isDragging) return;

    currentY = e.touches ? e.touches[0].clientY : e.clientY;
    let diff = currentY - startY;

    if (diff > 0) {
        bottomSheet.style.transition = "none";
        bottomSheet.style.transform = `translateY(${diff}px)`;
    }
}

/* -------- DRAG END -------- */
function stopDrag() {
    isDragging = false;
    bottomSheet.style.transition = "transform 0.4s ease";

    const moved = currentY - startY;

    if (moved > sheetHeight / 3) {
        hideBottomSheet(); // close if dragged enough
    } else {
        bottomSheet.style.transform = "translateY(0)";
    }

    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("touchend", stopDrag);
}
</script>
