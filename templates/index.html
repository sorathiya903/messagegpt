#flip {
  height:25px;
  opacity:0.7;
  padding-left:5px;

}

#flip > div > div {
  color:#fff;
  background: linear-gradient(90deg, #6c63ff, #00f0ff, #ff6a00, #ff1a75);

}
@keyframes gradientMove {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
#flip div:first-child {

<script>
/* ---------- FIREBASE ---------- */
const firebaseConfig = {
      apiKey: "AIzaSyBHenryTkUVP21VqW7KL44ZXM_P_Qq6IIc",
      authDomain: "chatting-e3bb2.firebaseapp.com",
      databaseURL: "https://chatting-e3bb2-default-rtdb.firebaseio.com/",
      projectId: "chatting-e3bb2",
      storageBucket: "chatting-e3bb2.appspot.com",
      messagingSenderId: "913896104186",
      appId: "1:913896104186:web:7a6c81f80268d46f772943",
      measurementId: "G-W9YHTX6SQR"
    };
    firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ---------- FIREBASE INIT ---------- */
  const imageInput = document.getElementById("imageInput");
const previewContainer = document.getElementById("imagePreviewContainer");
const previewImg = document.getElementById("previewImg");
const removeBtn = document.getElementById("removeImageBtn");

imageInput.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            previewImg.src = e.target.result;
            previewContainer.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});

removeBtn.onclick = () => {
    imageInput.value = "";
    previewContainer.style.display = "none";
};

function toggleTheme(){
 document.body.classList.toggle("light") 
}
/* ---------- ESCAPE HTML FUNCTION ---------- */
function escapeHTML(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
function toggleMenu(){
  document.getElementById('menu').classList.toggle("open")
}
/* ---------- CREATE AI MESSAGE WITH CODE & BOLD ---------- */
function createAIMessageWithCopy(text) {
    const box = document.createElement("div");
    box.className = "aiBox";

    const regex = /```([\s\S]*?)```/g;
    let last = 0, match;

    while ((match = regex.exec(text))) {
        // Text before code block
        const before = text.slice(last, match.index);
        if (before.trim()) {
            const p = document.createElement("div");
            p.innerHTML = escapeHTML(before).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            box.appendChild(p);
        }

        // Code block
        const pre = document.createElement("div");
        pre.className = "code-block";

        const code = document.createElement("code");
        code.textContent = match[1].trim();

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copy";
        btn.onclick = () => {
            navigator.clipboard.writeText(code.textContent);
            btn.textContent = "Copied!";
            setTimeout(()=>btn.textContent="Copy",1200);
        };

        pre.appendChild(btn);
        pre.appendChild(code);
        box.appendChild(pre);

        last = regex.lastIndex;
    }

    // Remaining text after last code block
    const after = text.slice(last);
    if (after.trim()) {
        const p = document.createElement("div");
        p.innerHTML = escapeHTML(after).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        box.appendChild(p);
    }

    return box;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    const imageFile = imageInput.files[0];
    if (!msg && !imageFile) return;

    const chat = document.getElementById("chatA");

    // ---------------- USER MESSAGE UI ----------------
    const my = document.createElement("div");
    my.className = "myMsg";

    const myBox = document.createElement("div");
    myBox.className = "myBox";

    // Show image in user message if exists
    if (imageFile) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.style.maxWidth = "160px";
            img.style.borderRadius = "12px";
            img.style.display = "block";
            img.style.marginBottom = "6px";
            myBox.prepend(img);
        };
        reader.readAsDataURL(imageFile);
    }

    if (msg) myBox.appendChild(document.createTextNode(msg));

    my.appendChild(myBox);
    chat.appendChild(my);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // ---------------- LOADER ----------------
    const loader = document.createElement("div");
    loader.className = "aiMsg";
    loader.innerHTML = `
        <div class="aiBox typing"><span></span><span></span><span></span></div>
        <div id=container>
            <div id=flip>
                <div><div>Analysing</div></div>
                <div><div>Searching</div></div>
                <div><div>Thinking</div></div>
            </div>
        </div>`;
    chat.appendChild(loader);
    chat.scrollTop = chat.scrollHeight;
 // 🧹 Clear image after sending
    imageInput.value = "";
    previewContainer.style.display = "none";

    try {
        let reply = null;
        let imageBase64 = null;

        // Convert image to base64 if exists
        if (imageFile) {
            const reader = new FileReader();
            imageBase64 = await new Promise(resolve => {
                reader.onload = e => resolve(e.target.result.split(",")[1]);
                reader.readAsDataURL(imageFile);
            });
        }

        // 🔍 Check Firebase cache (text only questions)
        if (msg) {
            const snapshot = await db.ref('mess')
                .orderByChild('question')
                .equalTo(msg)
                .once('value');

            if (snapshot.exists() && !imageBase64) {
                snapshot.forEach(child => {
                    reply = child.val().answer;
                });
            }
        }

        // 🌐 Call backend if no cached reply OR image present
        if (!reply) {
            const formData = new FormData();
formData.append("user_id", "default");
formData.append("message", msg);

if (imageFile) {
    formData.append("image", imageFile); // send real file, not base64
}

const res = await fetch("/chat", {
    method: "POST",
    body: formData
});

            const data = await res.json();
            reply = data.reply || data.error;

            if (msg && !imageBase64) {
                db.ref('qA').push({
                    question: msg,
                    answer: reply,
                    timestamp: new Date().toISOString()
                });
            }
        }

        loader.remove();

        // ---------------- AI MESSAGE UI ----------------
        const ai = document.createElement("div");
        ai.className = "aiMsg";
        ai.appendChild(createAIMessageWithCopy(reply));
        chat.appendChild(ai);
        chat.scrollTop = chat.scrollHeight;

        // Save to local history
        let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
        history.push({question: msg, answer: reply});
        localStorage.setItem("chatHistory", JSON.stringify(history));

    } catch (err) {
        loader.remove();
        const ai = document.createElement("div");
        ai.className = "aiMsg";
        ai.innerHTML = `<div class="aiBox">Error: ${escapeHTML(err.message)}</div>`;
        chat.appendChild(ai);
        chat.scrollTop = chat.scrollHeight;
    }

   }
  
  const showModalBtn = document.querySelector(".show-modal");
const bottomSheet = document.querySelector(".bottom-sheet");
const dragHandle = document.querySelector(".drag-handle");
const closeBtn = document.querySelector(".close-btn");

let isDragging = false;
let startY = 0;
let currentY = 0;
let sheetHeight = 0;

showModalBtn.addEventListener("click", () => {
    bottomSheet.style.transform = "translateY(0)";
    document.body.style.overflow = "hidden";
    sheetHeight = bottomSheet.offsetHeight;
});

closeBtn.addEventListener("click", hideBottomSheet);

function hideBottomSheet() {
    bottomSheet.style.transform = "translateY(100%)";
    document.body.style.overflow = "auto";
}

/* -------- DRAG START -------- */
dragHandle.addEventListener("mousedown", startDrag);
dragHandle.addEventListener("touchstart", startDrag);

function startDrag(e) {
    isDragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag);
    document.addEventListener("touchend", stopDrag);
}

/* -------- DRAGGING -------- */
function drag(e) {
    if (!isDragging) return;

    currentY = e.touches ? e.touches[0].clientY : e.clientY;
    let diff = currentY - startY;

    if (diff > 0) {
        bottomSheet.style.transition = "none";
        bottomSheet.style.transform = `translateY(${diff}px)`;
    }
}

/* -------- DRAG END -------- */
function stopDrag() {
    isDragging = false;
    bottomSheet.style.transition = "transform 0.4s ease";

    const moved = currentY - startY;

    if (moved > sheetHeight / 3) {
        hideBottomSheet(); // close if dragged enough
    } else {
        bottomSheet.style.transform = "translateY(0)";
    }

    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("touchend", stopDrag);
}
</script>
