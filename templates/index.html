    const prompt = document.getElementById("imagePrompt").value.trim();

    generateBtn.innerText = "Generating...";

        const res = await fetch("/generate-image", {
            method: "POST",

            body: JSON.stringify({ prompt })

        const data = await res.json();

    analyser.fftSize = 256;

    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    const canvas = document.getElementById("voiceWave");
    const ctx = canvas.getContext("2d");

    function draw(){
        animationId = requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let barWidth = (canvas.width / bufferLength) * 2;
        let barHeight;
        let x = 0;

        for(let i=0;i<bufferLength;i++){
            barHeight = dataArray[i] / 2;

            ctx.fillStyle = "#007bff";
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 1;
        }
    }

    draw();
}
  function stopWaveform(){

    // Stop animation loop
    if(animationId){
        cancelAnimationFrame(animationId);
        animationId = null;
    }

    // Stop mic stream
    if(stream){
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }

    // Close audio context
    if(audioContext){
        audioContext.close();
        audioContext = null;
    }

    // CLEAR CANVAS
    const canvas = document.getElementById("voiceWave");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

  function animateElementText(container) {
    if (container.innerHTML.includes("$")) return;
    const walker = document.createTreeWalker(
        container,
        NodeFilter.SHOW_TEXT,
        null,
        false
    );

    const textNodes = [];
    let node;

    while ((node = walker.nextNode())) {

        if (node.parentElement.closest(".msgActions")) continue;

        if (node.parentElement.closest("pre")) continue;

        if (node.nodeValue.trim() !== "") {
            textNodes.push(node);
        }
    }

    let delay = 0;

    textNodes.forEach(textNode => {
        const words = textNode.nodeValue.split(" ");
        const fragment = document.createDocumentFragment();

        words.forEach(word => {
            const span = document.createElement("span");
            span.textContent = word + " ";
            span.style.opacity = 0;
            span.style.display = "inline-block";
            span.style.animation = "fadeWord 0.2s forwards";
            span.style.animationDelay = delay + "s";
            delay += 0.015;

            fragment.appendChild(span);
        });

        textNode.parentNode.replaceChild(fragment, textNode);
    });

    return delay * 1000; 
}

function hideBottomSheet() {  
    bottomSheet.style.transform = "translateY(100%)";  
    document.body.style.overflow = "auto";  
}  
  
/* DRAG START  */  
dragHandle.addEventListener("mousedown", startDrag);  
dragHandle.addEventListener("touchstart", startDrag);  
  
function startDrag(e) {  
    isDragging = true;  
    startY = e.touches ? e.touches[0].clientY : e.clientY;  
  
    document.addEventListener("mousemove", drag);  
    document.addEventListener("mouseup", stopDrag);  
    document.addEventListener("touchmove", drag);  
    document.addEventListener("touchend", stopDrag);  
}  
  
/* DRAGGING */  
function drag(e) {  
    if (!isDragging) return;  
  
    currentY = e.touches ? e.touches[0].clientY : e.clientY;  
    let diff = currentY - startY;  
  
    if (diff > 0) {  
        bottomSheet.style.transition = "none";  
        bottomSheet.style.transform = `translateY(${diff}px)`;  
    }  
}  
  
/*  DRAG END  */  
function stopDrag() {  
    isDragging = false;  
    bottomSheet.style.transition = "transform 0.4s ease";  
  
    const moved = currentY - startY;  
  
    if (moved > sheetHeight / 3) {  
        hideBottomSheet();   
    } else {  
        bottomSheet.style.transform = "translateY(0)";  
    }  
  
    document.removeEventListener("mousemove", drag);  
    document.removeEventListener("mouseup", stopDrag);  
    document.removeEventListener("touchmove", drag);  
    document.removeEventListener("touchend", stopDrag);  
}  
  
  function speakResponse(text, lang) {
    const utterance = new SpeechSynthesisUtterance(text);

    const voices = speechSynthesis.getVoices();

    // Try to find male Indian voice
    let selectedVoice = voices.find(v =>
        v.lang.includes(lang) &&
        v.name.toLowerCase().includes("male")
    );

    // fallback
    if (!selectedVoice) {
        selectedVoice = voices.find(v => v.lang.includes(lang));
    }

    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    utterance.lang = lang;

    speechSynthesis.speak(utterance);
}
function sendVoiceToBackend(transcript, lang){

    formData.append("user_id", "voice_user");

}
const transcriptBox = document.getElementById("liveTranscript");
const languageSelect = document.getElementById("languageSelect");

let recognition;

function initRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function (event) {
        let transcript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        transcriptBox.innerText = transcript;

        // Send immediately when final result
        if (event.results[event.results.length - 1].isFinal) {
            sendVoiceToBackend(transcript, recognition.lang);
        }
    };

    recognition.onerror = function (e) {
        transcriptBox.innerHTML= "Speech error:", e 
    };
}

document.getElementById("micBtn").addEventListener("click", function(){

if(isListening){
    isListening = false;
    recognition.stop();
    stopWaveform();
    return;
}

    const SpeechRecognition = 
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        transcriptBox.innerText = "Speech Recognition not supported in this browser.";
        return;
    }

    recognition = new SpeechRecognition();

    
    let selectedLang = languageSelect.value;

    if(selectedLang === "auto"){
        recognition.lang = "en-IN"; // default fallback
    } else {
        recognition.lang = selectedLang;
    }

    recognition.interimResults = true;
    recognition.continuous = true;

    recognition.onstart = function(){
        isListening = true;
        micBtn.classList.add("listening");
        micBtn.innerText = "🛑 Stop Listening";
        transcriptBox.innerText = "Listening...";
      startWaveform();
    };

    recognition.onresult = function(event){

        let transcript = "";

        for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        // SHOW LIVE DETECTED TEXT
        transcriptBox.innerText = transcript;

        if(event.results[event.results.length - 1].isFinal){
            sendVoiceToBackend(transcript, recognition.lang);
        }
    };

    recognition.onerror = function(e){
        transcriptBox.innerText = "Speech error: " + e.error;
    };

    recognition.onend = function(){
    if(isListening){
        recognition.start(); 
    }else{
        stopWaveform();
        micBtn.classList.remove("listening");
      transcriptBox.innerHTML="Click the button to Start"
        micBtn.innerText = "🎤 Start Listening";
    }
};
    speechSynthesis.cancel();
    recognition.start();
});
