function createHeadingFromMarkdown(text, container) {  
    const match = text.match(/##\s*(.*?)\s*##/);

  function animateElementText(container) {
    if (container.innerHTML.includes("$")) return;
    const walker = document.createTreeWalker(
        container,
        NodeFilter.SHOW_TEXT,
        null,
        false
    );

    const textNodes = [];
    let node;

    while ((node = walker.nextNode())) {

        
        if (node.parentElement.closest(".msgActions")) continue;

        
        if (node.parentElement.closest("pre")) continue;

        if (node.nodeValue.trim() !== "") {
            textNodes.push(node);
        }
    }

    let delay = 0;

    textNodes.forEach(textNode => {
        const words = textNode.nodeValue.split(" ");
        const fragment = document.createDocumentFragment();

        words.forEach(word => {
            const span = document.createElement("span");
            span.textContent = word + " ";
            span.style.opacity = 0;
            span.style.display = "inline-block";
            span.style.animation = "fadeWord 0.2s forwards";
            span.style.animationDelay = delay + "s";
            delay += 0.015;

            fragment.appendChild(span);
        });

        textNode.parentNode.replaceChild(fragment, textNode);
    });

    return delay * 1000; 
}

  function autoResizeMath(container) {  
    const mathBlocks = container.querySelectorAll('.math-display');  
  
    mathBlocks.forEach(math => {  
        const tex = math.textContent || "";  
        let fontSize = 1.1; // default em size  
  
        // Adjust font size based on character count  
        if (tex.length > 30) fontSize = 0.8;  
        if (tex.length > 60) fontSize = 0.7;  
        if (tex.length > 80) fontSize = 0.6;  
        if (tex.length > 100) fontSize = 0.5;  
  
        math.style.fontSize = fontSize + "em";  
    });

        div.className = "imgWrap";

        previewContainer.appendChild(div);  
    });

function removeFile(index) {  
    URL.revokeObjectURL(selectedFiles[index]);  
    selectedFiles.splice(index, 1);  
    if (selectedFiles.length === 0) previewContainer.style.display = "none";  
    renderPreviews();  
}

function hideBottomSheet() {  
    bottomSheet.style.transform = "translateY(100%)";  
    document.body.style.overflow = "auto";  
}  
  
/* -------- DRAG START -------- */  
dragHandle.addEventListener("mousedown", startDrag);  
dragHandle.addEventListener("touchstart", startDrag);  
  
function startDrag(e) {  
    isDragging = true;  
    startY = e.touches ? e.touches[0].clientY : e.clientY;  
  
    document.addEventListener("mousemove", drag);  
    document.addEventListener("mouseup", stopDrag);  
    document.addEventListener("touchmove", drag);  
    document.addEventListener("touchend", stopDrag);  
}  
  
/* -------- DRAGGING -------- */  
function drag(e) {  
    if (!isDragging) return;  
  
    currentY = e.touches ? e.touches[0].clientY : e.clientY;  
    let diff = currentY - startY;  
  
    if (diff > 0) {  
        bottomSheet.style.transition = "none";  
        bottomSheet.style.transform = `translateY(${diff}px)`;  
    }  
}  
  
/* -------- DRAG END -------- */  
function stopDrag() {  
    isDragging = false;  
    bottomSheet.style.transition = "transform 0.4s ease";  
  
    const moved = currentY - startY;  
  
    if (moved > sheetHeight / 3) {  
        hideBottomSheet(); // close if dragged enough  
    } else {  
        bottomSheet.style.transform = "translateY(0)";  
    }  
  
    document.removeEventListener("mousemove", drag);  
    document.removeEventListener("mouseup", stopDrag);  
    document.removeEventListener("touchmove", drag);  
    document.removeEventListener("touchend", stopDrag);  
}
