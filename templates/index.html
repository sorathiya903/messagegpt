function drawMindMap(data){
document.getElementById("downloadBtn").style.display = "block"
document.getElementById("mindMapArea").innerHTML=""

const width = 1400
const height = 700

const svg = d3.select("#mindMapArea")
.append("svg")
.attr("width",width)
.attr("height",height)

const g = svg.append("g")

// ZOOM + PAN + PINCH
svg.call(
d3.zoom()
.scaleExtent([0.3,3])
.on("zoom",(event)=>{
g.attr("transform",event.transform)
})
)

const tree = d3.tree().nodeSize([90,420])

root = d3.hierarchy(data)

root.x0 = height/2
root.y0 = 0

update(root)

function update(source){

const treeData = tree(root)

const nodes = treeData.descendants()
const links = treeData.links()

// LINKS
const link = g.selectAll(".link")
.data(links,d=>d.target.data.name)

link.enter()
.append("path")
.attr("class","link")
.attr("d",d3.linkHorizontal()
.x(d=>source.y)
.y(d=>source.x)
)
.merge(link)
.transition()
.duration(400)
.attr("d",d3.linkHorizontal()
.x(d=>d.y)
.y(d=>d.x)
)

link.exit()
.transition()
.duration(400)
.attr("d",d3.linkHorizontal()
.x(d=>source.y)
.y(d=>source.x)
)
.remove()

// NODES
const node = g.selectAll(".node")
.data(nodes,d=>d.data.name)

const nodeEnter = node.enter()
.append("g")
.attr("class","node")
.attr("transform",d=>`translate(${source.y},${source.x})`)
.on("click",(event,d)=>toggle(d))

// TEXT FIRST
nodeEnter.append("text")
.attr("text-anchor","middle")
.attr("dy","2")
.text(d=>d.data.name)

// AUTO SIZE RECTANGLE BASED ON TEXT
nodeEnter.each(function(){

const gnode = d3.select(this)
const text = gnode.select("text")

const bbox = text.node().getBBox()

gnode.insert("rect","text")
.attr("x",-(bbox.width/2)-12)
.attr("y",-bbox.height)
.attr("width",bbox.width+24)
.attr("height",bbox.height+10)

})

// UPDATE
nodeEnter.merge(node)
.transition()
.duration(400)
.attr("transform",d=>`translate(${d.y},${d.x})`)

node.exit()
.transition()
.duration(400)
.attr("transform",d=>`translate(${source.y},${source.x})`)
.remove()

}

// COLLAPSE FUNCTION
function toggle(d){

if(d.children){
d._children = d.children
d.children = null
}else{
d.children = d._children
d._children = null
}

update(d)

}

  }

let mindZoom = 1

function enableMindMapControls(){

const container = document.getElementById("mindmapContainer")
if(!container) return

container.style.overflow = "auto"
container.style.position = "relative"

const svg = container.querySelector("svg")
if(!svg) return

svg.style.transformOrigin = "0 0"
svg.style.transition = "transform 0.2s ease"

// ZOOM WITH MOUSE WHEEL
container.addEventListener("wheel", function(e){

e.preventDefault()

if(e.deltaY < 0){
mindZoom += 0.1
}else{
mindZoom -= 0.1
}

if(mindZoom < 0.4) mindZoom = 0.4
if(mindZoom > 3) mindZoom = 3

svg.style.transform = `scale(${mindZoom})`

})

// PAN / DRAG
let isDragging = false
let startX, startY
let scrollLeft, scrollTop

container.addEventListener("mousedown", e=>{
isDragging = true
startX = e.pageX - container.offsetLeft
startY = e.pageY - container.offsetTop
scrollLeft = container.scrollLeft
scrollTop = container.scrollTop
})

container.addEventListener("mouseleave", ()=>{
isDragging = false
})

container.addEventListener("mouseup", ()=>{
isDragging = false
})

container.addEventListener("mousemove", e=>{
if(!isDragging) return
e.preventDefault()

const x = e.pageX - container.offsetLeft
const y = e.pageY - container.offsetTop

const walkX = (x - startX)
const walkY = (y - startY)

container.scrollLeft = scrollLeft - walkX
container.scrollTop = scrollTop - walkY
})

  }

  function downloadPNG(){

const svg = document.querySelector("#mindMapArea svg")

if(!svg){
alert("Generate a mind map first")
return
}

const serializer = new XMLSerializer()
const svgString = serializer.serializeToString(svg)

const svgBlob = new Blob([svgString], {type:"image/svg+xml;charset=utf-8"})
const url = URL.createObjectURL(svgBlob)

const img = new Image()

img.onload = function(){

// HIGH RESOLUTION SCALE
const scale = 3

const canvas = document.createElement("canvas")

canvas.width = svg.clientWidth * scale
canvas.height = svg.clientHeight * scale

const ctx = canvas.getContext("2d")

ctx.scale(scale,scale)

ctx.fillStyle = "white"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.drawImage(img,0,0)

URL.revokeObjectURL(url)

const link = document.createElement("a")
link.download = "mindmap.png"
link.href = canvas.toDataURL("image/png")
link.click()

}

img.src = url

  }

  function extractHTML(aiResponse) {

    // Match <!DOCTYPE html> ... </html>
    let doctypeMatch = aiResponse.match(/<!DOCTYPE\s*html[\s\S]*?<\/html>/i);

    if (doctypeMatch) {
        return doctypeMatch[0];
    }

    // Match <html> ... </html>
    let htmlMatch = aiResponse.match(/<html[\s\S]*?<\/html>/i);

    if (htmlMatch) {
        return htmlMatch[0];
    }

    // If nothing found return original
    return aiResponse;
}

  async function startWaveform(){

    stream = await navigator.mediaDevices.getUserMedia({audio:true});

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();

    microphone = audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);

    analyser.fftSize = 256;

    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    const canvas = document.getElementById("voiceWave");
    const ctx = canvas.getContext("2d");

    function draw(){
        animationId = requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let barWidth = (canvas.width / bufferLength) * 2;
        let barHeight;
        let x = 0;

        for(let i=0;i<bufferLength;i++){
            barHeight = dataArray[i] / 2;

            ctx.fillStyle = "#007bff";
            ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 1;
        }
    }

    draw();
}
  function stopWaveform(){

    // Stop animation loop
    if(animationId){
        cancelAnimationFrame(animationId);
        animationId = null;
    }

    // Stop mic stream
    if(stream){
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }

    // Close audio context
    if(audioContext){
        audioContext.close();
        audioContext = null;
    }

    // CLEAR CANVAS
    const canvas = document.getElementById("voiceWave");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

  function animateElementText(container) {
    if (container.innerHTML.includes("$")) return;
    const walker = document.createTreeWalker(
        container,
        NodeFilter.SHOW_TEXT,
        null,
        false
    );

    const textNodes = [];
    let node;

    while ((node = walker.nextNode())) {

        // skip buttons
        if (node.parentElement.closest(".msgActions")) continue;

        // skip code blocks
        if (node.parentElement.closest("pre")) continue;

        if (node.nodeValue.trim() !== "") {
            textNodes.push(node);
        }
    }

    let delay = 0;

    textNodes.forEach(textNode => {
        const words = textNode.nodeValue.split(" ");
        const fragment = document.createDocumentFragment();

        words.forEach(word => {
            const span = document.createElement("span");
            span.textContent = word + " ";
            span.style.opacity = 0;
            span.style.display = "inline-block";
            span.style.animation = "fadeWord 0.2s forwards";
            span.style.animationDelay = delay + "s";
            delay += 0.015;

            fragment.appendChild(span);
        });

        textNode.parentNode.replaceChild(fragment, textNode);
    });

    return delay * 1000; // return animation time
}

    bottomSheet.style.transform = "translateY(100%)";  
    document.body.style.overflow = "auto";  
}  
  
/* -------- DRAG START -------- */  
dragHandle.addEventListener("mousedown", startDrag);  
dragHandle.addEventListener("touchstart", startDrag);  
  
function startDrag(e) {  
    isDragging = true;  
    startY = e.touches ? e.touches[0].clientY : e.clientY;  
  
    document.addEventListener("mousemove", drag);  
    document.addEventListener("mouseup", stopDrag);  
    document.addEventListener("touchmove", drag);  
    document.addEventListener("touchend", stopDrag);  
}  
  
/* -------- DRAGGING -------- */  
function drag(e) {  
    if (!isDragging) return;  
  
    currentY = e.touches ? e.touches[0].clientY : e.clientY;  
    let diff = currentY - startY;  
  
    if (diff > 0) {  
        bottomSheet.style.transition = "none";  
        bottomSheet.style.transform = `translateY(${diff}px)`;  
    }  
}  
  
/* -------- DRAG END -------- */  
function stopDrag() {  
    isDragging = false;  
    bottomSheet.style.transition = "transform 0.4s ease";  
  
    const moved = currentY - startY;  
  
    if (moved > sheetHeight / 3) {  
        hideBottomSheet(); // close if dragged enough  
    } else {  
        bottomSheet.style.transform = "translateY(0)";  
    }  
  
    document.removeEventListener("mousemove", drag);  
    document.removeEventListener("mouseup", stopDrag);  
    document.removeEventListener("touchmove", drag);  
    document.removeEventListener("touchend", stopDrag);  
}  
  
  function speakResponse(text, lang) {
    const utterance = new SpeechSynthesisUtterance(text);

    const voices = speechSynthesis.getVoices();

    // Try to find male Indian voice
    let selectedVoice = voices.find(v =>
        v.lang.includes(lang) &&
        v.name.toLowerCase().includes("male")
    );

    // fallback
    if (!selectedVoice) {
        selectedVoice = voices.find(v => v.lang.includes(lang));
    }

    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    utterance.lang = lang;

    speechSynthesis.speak(utterance);
}
function sendVoiceToBackend(transcript, lang){

    const formData = new FormData();
    formData.append("user_id", "voice_user");
    formData.append("message", transcript);

    fetch("/chat", {
        method: "POST",
        body: formData
    })
    .then(response => {
        if(!response.ok){
            throw new Error("Network response not ok");
        }
        return response.json();
    })
    .then(data => {

        if(data.reply){
            // Show AI reply on screen
            document.getElementById("liveTranscript").innerText += 
                "\n\n🤖 AI: " + data.reply;

            // Optional: Speak reply
            speakResponse(data.reply);
        }

        if(data.error){
            console.error("Server Error:", data.error);
        }

    })
    .catch(error => {
        console.error("Fetch Error:", error);
        document.getElementById("liveTranscript").innerText =
            "Error connecting to server.";
    });
}
const transcriptBox = document.getElementById("liveTranscript");
const languageSelect = document.getElementById("languageSelect");
const micBtn = document.getElementById("micBtn"); // your mic button

let recognition;

function initRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function (event) {
        let transcript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        transcriptBox.innerText = transcript;

        // Send immediately when final result
        if (event.results[event.results.length - 1].isFinal) {
            sendVoiceToBackend(transcript, recognition.lang);
        }
    };

    recognition.onerror = function (e) {
        transcriptBox.innerHTML= "Speech error:", e 
    };
}

document.getElementById("micBtn").addEventListener("click", function(){

if(isListening){
    isListening = false;
    recognition.stop();
    stopWaveform();
    return;
}

    const SpeechRecognition = 
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        transcriptBox.innerText = "Speech Recognition not supported in this browser.";
        return;
    }

    recognition = new SpeechRecognition();

    // Use selected language
  
    let selectedLang = languageSelect.value;

    if(selectedLang === "auto"){
        recognition.lang = "en-IN"; // default fallback
    } else {
        recognition.lang = selectedLang;
    }

    recognition.interimResults = true;
    recognition.continuous = true;

    recognition.onstart = function(){
        isListening = true;
        micBtn.classList.add("listening");
        micBtn.innerText = "🛑 Stop Listening";
        transcriptBox.innerText = "Listening...";
      startWaveform();
    };

    recognition.onresult = function(event){

        let transcript = "";

        for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        // SHOW LIVE DETECTED TEXT
        transcriptBox.innerText = transcript;

        if(event.results[event.results.length - 1].isFinal){
            sendVoiceToBackend(transcript, recognition.lang);
        }
    };

    recognition.onerror = function(e){
        transcriptBox.innerText = "Speech error: " + e.error;
    };

    recognition.onend = function(){
    if(isListening){
        recognition.start(); 
    }else{
        stopWaveform();
        micBtn.classList.remove("listening");
      transcriptBox.innerHTML="Click the button to Start"
        micBtn.innerText = "🎤 Start Listening";
    }
};
    speechSynthesis.cancel();
    recognition.start();
});
